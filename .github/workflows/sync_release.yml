name: Sync Release

on:
  schedule:
    - cron: "30 * * * *"  # 每小时同步一次
  workflow_dispatch:

jobs:
  sync_release:
    runs-on: ubuntu-latest
    steps:
      - name: Sync latest release with assets
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // 获取上游最新 release
            const upstream = await github.rest.repos.getLatestRelease({
              owner: 'wenfxl',
              repo: 'openai-cpa'
            });
            const tag = upstream.data.tag_name;

            // 检查是否已存在
            let exists = false;
            try {
              await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: tag
              });
              exists = true;
            } catch (e) {}

            if (exists) {
              console.log(`Release ${tag} already exists, skipping.`);
              return;
            }

            // 创建 release
            const newRelease = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: upstream.data.name,
              body: upstream.data.body,
              draft: upstream.data.draft,
              prerelease: upstream.data.prerelease
            });

            // 下载并上传附件
            const assets = upstream.data.assets;
            for (const asset of assets) {
              console.log(`Downloading asset: ${asset.name}`);
              const response = await fetch(asset.browser_download_url);
              const buffer = Buffer.from(await response.arrayBuffer());

              await github.rest.repos.uploadReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: newRelease.data.id,
                name: asset.name,
                data: buffer,
                headers: {
                  'content-type': asset.content_type,
                  'content-length': buffer.length
                }
              });
              console.log(`Uploaded: ${asset.name}`);
            }
            console.log(`Release ${tag} synced successfully!`);
