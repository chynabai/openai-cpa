name: Sync Release

on:
  schedule:
    - cron: "0 1 * * *"  # 每天北京时间 09:00
  workflow_dispatch:

jobs:
  sync_release:
    runs-on: ubuntu-latest
    steps:
      - name: Sync latest release from upstream
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // 获取上游最新 release
            const upstream = await github.rest.repos.getLatestRelease({
              owner: 'cmliu',
              repo: 'edgetunnel'
            });
            
            const tag = upstream.data.tag_name;
            
            // 检查自己仓库是否已有该 release
            try {
              await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag: tag
              });
              console.log(`Release ${tag} already exists, skipping.`);
            } catch (e) {
              // 不存在则创建
              await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: tag,
                name: upstream.data.name,
                body: upstream.data.body,
                draft: upstream.data.draft,
                prerelease: upstream.data.prerelease
              });
              console.log(`Created release ${tag}`);
            }
